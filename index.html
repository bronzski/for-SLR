<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Склад 1.0 — Приёмка (Poka-Yoke Demo)</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D0%A1%D0%BA%D0%BB%D0%B0%D0%B4%22%2C%22short_name%22%3A%22%D0%A1%D0%BA%D0%BB%D0%B0%D0%B4%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f5f5%22%2C%22theme_color%22%3A%22%230d6efd%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Crect%20width%3D'100'%20height%3D'100'%20fill%3D'%230d6efd'%2F%3E%3Ctext%20x%3D'50'%20y%3D'65'%20font-size%3D'50'%20text-anchor%3D'middle'%20fill%3D'white'%3E%D0%A1%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <style>
        :root {
            --primary: #0d6efd;
            --danger: #dc3545;
            --success: #198754;
            --warning: #ffc107;
            --gray: #6c757d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #212529;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 1rem;
        }
        .app-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 0.5rem 2rem rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
        }
        .header {
            background: var(--primary);
            color: white;
            padding: 1rem 1.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .content {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .step-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
        }
        .step-indicator span {
            background: var(--primary);
            color: white;
            padding: 0.2rem 0.7rem;
            border-radius: 1rem;
            font-weight: 600;
        }
        .instruction {
            font-size: 1.3rem;
            font-weight: 500;
            color: #0d6efd;
            text-align: center;
            margin-bottom: 1rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            background: #e9ecef;
            color: #212529;
            width: 100%;
            margin-bottom: 0.75rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); }
        .btn:active { transform: scale(0.97); }
        .btn-group {
            display: flex;
            gap: 1rem;
        }
        .card {
            background: #f1f3f5;
            border-radius: 1rem;
            padding: 1rem;
        }
        .upload-area {
            border: 2px dashed #adb5bd;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            background: #f8f9fa;
        }
        .upload-area img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.7rem 0;
            border-bottom: 1px solid #dee2e6;
        }
        .text-muted { color: #6c757d; font-size: 0.9rem; }
        .timer {
            font-weight: bold;
            font-size: 1.2rem;
            margin: 0.5rem 0;
        }
        @media (max-width: 480px) {
            body { padding: 0; }
            .app-container { border-radius: 0; min-height: 100vh; }
            .btn { padding: 1rem; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <div class="header">📦 Склад MiniSlide — Приёмка</div>
    <div class="content" id="content"></div>
</div>

<script>
    // ----- Состояние приложения -----
    const state = {
        step: 'start', // start, packaging, unload, scan_doc, verify_labels, quality_control, placement, done
        receiptNumber: null,
        userId: 'Кладовщик_Иванов',
        startTime: null,
        defectsPackaging: false,
        packagingPhotos: [],
        unloadStart: null,
        unloadEnd: null,
        docImages: [],       // фото страниц УПД
        parsedDoc: null,     // результат "распознавания"
        actualItems: [],     // список позиций, сверенных по этикеткам
        qualityResults: {},  // id -> {defect: bool, photos: []}
        placementMap: {},    // id -> {location: 'B-12'}
        currentItemIdx: 0,
    };

    const DEMO_PARSED_DOC = {
        supplier: 'ООО "Автодеталь"',
        docNumber: 'УПД-24589',
        docDate: '2026-06-18',
        buyer: 'MiniSlide Центр',
        items: [
            { id: 1, name: 'Бампер передний BMW X5', article: 'BMW-5111-12345', qty: 2, unit: 'шт' },
            { id: 2, name: 'Фара левая Audi A6', article: 'AU-941-67890', qty: 1, unit: 'шт' },
            { id: 3, name: 'Зеркало правое Skoda Octavia', article: 'SK-5E1-857', qty: 2, unit: 'шт' },
            { id: 4, name: 'Стекло лобовое Kia Sportage', article: 'KI-86110-F1000', qty: 1, unit: 'шт' },
            { id: 5, name: 'Решётка радиатора VW Tiguan', article: 'VW-5NA-853-651', qty: 1, unit: 'шт' },
        ]
    };

    // Утилиты
    function generateReceiptNumber() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const year = now.getFullYear();
        const count = Math.floor(Math.random() * 100) + 1; // имитация счётчика
        return `П-${month}${year}-${String(count).padStart(3, '0')}`;
    }

    function render(html) {
        document.getElementById('content').innerHTML = html;
    }

    function saveStateAndRender(renderFn) {
        renderFn();
    }

    // ----- Шаги -----
    function startScreen() {
        state.receiptNumber = generateReceiptNumber();
        state.step = 'start';
        render(`
            <div style="text-align:center;">
                <h3>👋 Добро пожаловать, ${state.userId}</h3>
                <p class="text-muted">Новая поставка №${state.receiptNumber}</p>
                <button class="btn btn-primary" onclick="stepPackaging()">🚚 Начать приёмку</button>
            </div>
        `);
    }

    function stepPackaging() {
        state.step = 'packaging';
        render(`
            <div class="step-indicator"><span>1/7</span> Осмотр упаковок до выгрузки</div>
            <div class="instruction">Осмотри прибывший груз в машине.</div>
            <p>Есть ли повреждения упаковок (порваны, мокрые, вмятины)?</p>
            <div class="btn-group">
                <button class="btn btn-outline" onclick="packagingDefectYes()">✅ Да, есть дефекты</button>
                <button class="btn btn-outline" onclick="packagingDefectNo()">❌ Нет, всё целое</button>
            </div>
        `);
    }

    function packagingDefectYes() {
        state.defectsPackaging = true;
        // Имитация фотографирования дефектов
        showCameraUpload('Сфотографируйте дефекты упаковки', (files) => {
            state.packagingPhotos = files.map(f => URL.createObjectURL(f));
            alert('Дефекты зафиксированы. Продолжайте.');
            stepUnload();
        }, true);
    }

    function packagingDefectNo() {
        state.defectsPackaging = false;
        stepUnload();
    }

    function stepUnload() {
        state.step = 'unload';
        state.unloadStart = new Date();
        render(`
            <div class="step-indicator"><span>2/7</span> Выгрузка</div>
            <div class="instruction">Выгружайте товар из машины.</div>
            <p class="text-muted">Нажмите «Завершить выгрузку», когда всё будет выгружено.</p>
            <div class="timer" id="unloadTimer">00:00:00</div>
            <button class="btn btn-primary" onclick="finishUnload()">🏁 Завершить выгрузку</button>
        `);
        // Запуск секундомера
        window.unloadInterval = setInterval(() => {
            const diff = Math.floor((new Date() - state.unloadStart) / 1000);
            const h = String(Math.floor(diff/3600)).padStart(2,'0');
            const m = String(Math.floor((diff%3600)/60)).padStart(2,'0');
            const s = String(diff%60).padStart(2,'0');
            const el = document.getElementById('unloadTimer');
            if(el) el.textContent = `${h}:${m}:${s}`;
        }, 1000);
    }

    function finishUnload() {
        clearInterval(window.unloadInterval);
        state.unloadEnd = new Date();
        stepScanDocument();
    }

    function stepScanDocument() {
        state.step = 'scan_doc';
        render(`
            <div class="step-indicator"><span>3/7</span> Сканирование УПД</div>
            <div class="instruction">Сфотографируйте все страницы документа поставки.</div>
            <div id="docPreview" class="upload-area" onclick="triggerDocPhoto()">
                📄 Нажмите, чтобы добавить страницу
                <div id="docThumbs"></div>
            </div>
            <button class="btn btn-primary" onclick="simulateOCR()">🔍 Завершить сканирование и распознать</button>
        `);
        state.docImages = [];
    }

    function triggerDocPhoto() {
        showCameraUpload('Фото страницы УПД', (files) => {
            const file = files[0];
            state.docImages.push(file);
            const thumb = document.getElementById('docThumbs');
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            img.style.maxWidth = '100px'; img.style.margin = '0.3rem';
            thumb.appendChild(img);
        });
    }

    function simulateOCR() {
        if (state.docImages.length === 0) {
            alert('Сделайте хотя бы одно фото документа.');
            return;
        }
        // Имитация работы нейросети
        state.parsedDoc = JSON.parse(JSON.stringify(DEMO_PARSED_DOC));
        state.actualItems = []; // сбрасываем
        stepVerifyLabels();
    }

    function stepVerifyLabels() {
        state.step = 'verify_labels';
        const doc = state.parsedDoc;
        if (!doc) return startScreen();
        const remaining = doc.items.filter(it => !state.actualItems.find(a => a.id === it.id));
        if (remaining.length === 0) {
            // Все позиции подтверждены
            if (state.actualItems.length < doc.items.length) {
                alert(`⚠️ Недостача: отсутствуют позиции: ${doc.items.filter(i=>!state.actualItems.find(a=>a.id===i.id)).map(i=>i.name).join(', ')}`);
            }
            stepQualityControl();
            return;
        }
        render(`
            <div class="step-indicator"><span>4/7</span> Сверка этикеток</div>
            <div class="instruction">Сфотографируйте этикетку каждой позиции.</div>
            <p>Ожидается позиций: ${doc.items.length}. Подтверждено: ${state.actualItems.length}.</p>
            <div id="labelList"></div>
            <button class="btn btn-outline" onclick="skipRemaining()">⚠️ Проверка завершена (недостача)</button>
        `);
        displayLabelVerification(remaining);
    }

    function displayLabelVerification(remaining) {
        const container = document.getElementById('labelList');
        container.innerHTML = remaining.map(item => `
            <div class="list-item">
                <div><strong>${item.name}</strong><br><small>Арт: ${item.article} | ${item.qty} ${item.unit}</small></div>
                <button class="btn btn-sm btn-outline" onclick="scanLabel(${item.id})">📸 Сканировать этикетку</button>
            </div>
        `).join('');
    }

    function scanLabel(itemId) {
        showCameraUpload(`Сканируйте этикетку позиции ID=${itemId}`, (files) => {
            // Имитация успешного распознавания
            const item = state.parsedDoc.items.find(i => i.id === itemId);
            if (item && !state.actualItems.find(a => a.id === itemId)) {
                state.actualItems.push({...item});
            }
            stepVerifyLabels();
        });
    }

    function skipRemaining() {
        // Пользователь говорит, что проверил всё – оставшиеся считаются недостачей
        stepQualityControl();
    }

    function stepQualityControl() {
        state.step = 'quality_control';
        const allItems = state.parsedDoc.items;
        const unchecked = allItems.filter(i => !(i.id in state.qualityResults));
        if (unchecked.length === 0) {
            stepPlacement();
            return;
        }
        const currentItem = unchecked[0];
        state.currentItemIdx = allItems.indexOf(currentItem);
        render(`
            <div class="step-indicator"><span>5/7</span> Входной контроль</div>
            <div class="instruction">Осмотрите позицию: <strong>${currentItem.name}</strong></div>
            <p>Артикул: ${currentItem.article}</p>
            <button class="btn btn-success" onclick="qualityResult(${currentItem.id}, false)">✅ Дефектов нет</button>
            <button class="btn btn-danger" onclick="qualityResult(${currentItem.id}, true)">🔍 Обнаружен дефект</button>
        `);
    }

    function qualityResult(itemId, hasDefect) {
        if (hasDefect) {
            showCameraUpload('Сфотографируйте общий вид и дефекты (можно несколько)', (files) => {
                state.qualityResults[itemId] = {
                    defect: true,
                    photos: files.map(f => URL.createObjectURL(f))
                };
                alert('Дефекты зафиксированы. Продолжайте.');
                stepQualityControl();
            }, true);
        } else {
            state.qualityResults[itemId] = { defect: false, photos: [] };
            stepQualityControl();
        }
    }

    function stepPlacement() {
        state.step = 'placement';
        const allItems = state.parsedDoc.items;
        const unplaced = allItems.filter(i => !(i.id in state.placementMap));
        if (unplaced.length === 0) {
            finishReceipt();
            return;
        }
        const currentItem = unplaced[0];
        const defectInfo = state.qualityResults[currentItem.id];
        const isDefect = defectInfo && defectInfo.defect;
        render(`
            <div class="step-indicator"><span>6/7</span> Размещение на хранение</div>
            <div class="instruction">Разместите: <strong>${currentItem.name}</strong></div>
            ${isDefect ? '<p style="color:red;">⚠️ Деталь с дефектом — поместите в ИЗОЛЯТОР БРАКА!</p>' : ''}
            <p>Сфотографируйте QR-код ячейки размещения.</p>
            <button class="btn btn-outline" onclick="scanLocation(${currentItem.id})">📸 Сканировать ячейку</button>
        `);
    }

    function scanLocation(itemId) {
        showCameraUpload('Отсканируйте QR/штрихкод ячейки', (files) => {
            const location = prompt('Введите адрес ячейки (или ОК для авто):', 'B-12-3');
            state.placementMap[itemId] = { location: location || 'B-12-3' };
            alert(`Размещено в ${location}. Распечатан внутренний ярлык.`);
            stepPlacement();
        });
    }

    function finishReceipt() {
        state.step = 'done';
        const totalTime = state.unloadEnd ? Math.round((state.unloadEnd - state.unloadStart)/1000) : 0;
        render(`
            <div class="step-indicator"><span>7/7</span> Завершение</div>
            <div class="instruction">🎉 Приёмка №${state.receiptNumber} завершена!</div>
            <div class="card">
                <p><strong>Поставщик:</strong> ${state.parsedDoc.supplier}</p>
                <p><strong>Документ:</strong> ${state.parsedDoc.docNumber} от ${state.parsedDoc.docDate}</p>
                <p><strong>Позиций принято:</strong> ${state.parsedDoc.items.length}</p>
                <p><strong>Дефектных:</strong> ${Object.values(state.qualityResults).filter(v=>v.defect).length}</p>
                <p><strong>Время выгрузки:</strong> ${totalTime} сек</p>
            </div>
            <p class="text-muted" style="text-align:center;">✅ Автоматически сформированы: поступление и приходный ордер в 1С.<br>Уведомления о дефектах отправлены экспертам.</p>
            <button class="btn btn-primary" onclick="startScreen()">🔄 Новая приёмка</button>
        `);
        // Имитация отправки в 1С
        console.log('Отправка в 1С: поступление, приходный ордер, размещение.');
    }

    // Универсальная функция захвата фото
    function showCameraUpload(promptText, callback, multiple = false) {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.capture = 'environment'; // на мобильных основная камера
        if (multiple) input.multiple = true;
        input.onchange = (e) => {
            if (e.target.files.length > 0) {
                callback(Array.from(e.target.files));
            }
        };
        // Показываем подсказку
        const msg = document.createElement('div');
        msg.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:rgba(0,0,0,0.8);color:white;padding:2rem;text-align:center;z-index:9999;font-size:1.2rem;';
        msg.textContent = promptText + ' (нажмите для выбора файла/камеры)';
        document.body.appendChild(msg);
        input.click();
        input.addEventListener('change', () => {
            document.body.removeChild(msg);
        });
        // Если пользователь отменил
        input.addEventListener('cancel', () => {
            document.body.removeChild(msg);
        });
    }

    // Старт
    startScreen();
</script>
</body>
</html>
